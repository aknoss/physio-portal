services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: physio
      POSTGRES_PASSWORD: physio
      POSTGRES_DB: physio
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U physio -d physio"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: physio-portal-api:dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://physio:physio@postgres:5432/physio
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api-uploads:/app/apps/api/uploads
    profiles: ["full"]

  web:
    image: physio-portal-web:dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - api
    profiles: ["full"]

volumes:
  postgres-data:
  api-uploads:
